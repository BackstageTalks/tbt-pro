name: Weekly Torq Tennis Abstract Sync

on:
  schedule:
    # Tennis Abstract usually updates on Monday.
    # Run Tuesday around 03:00 SK/CZ. GitHub cron is UTC.
    - cron: '0 1 * * 2'
    - cron: '0 2 * * 2'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-torq-ta-sync
  cancel-in-progress: false

jobs:
  sync-ta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas lxml html5lib beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile TA sync
        run: |
          python -m py_compile torq_ta_weekly_sync.py
          python -m py_compile torq_tennisabstract.py

      - name: Download Tennis Abstract Elo/yElo pages safely
        run: python torq_ta_weekly_sync.py

      - name: Commit TA raw HTML, snapshot and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/torq_tennisabstract torq_ta_weekly_sync.py .github/workflows/weekly-torq-ta-sync.yml || true
          if git diff --cached --quiet; then
            echo "No Tennis Abstract changes to commit."
            exit 0
          fi
          git commit -m "Update weekly Tennis Abstract Torq snapshot"
          git pull --rebase --autostash
          git push
