name: CORQ Smoke Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile project
        run: |
          python - <<'PY'
          import compileall
          import sys
          from pathlib import Path

          paths = [
              "engine.py",
              "corq",
              "thinq",
              "runtime",
          ]

          ok = True
          for raw_path in paths:
              path = Path(raw_path)
              if not path.exists():
                  print(f"SKIP missing path: {path}")
                  continue
              if path.is_file():
                  result = compileall.compile_file(str(path), quiet=1)
              else:
                  result = compileall.compile_dir(str(path), quiet=1)
              ok = ok and bool(result)

          if not ok:
              print("Compile failed")
              sys.exit(1)

          print("Compile OK")
          PY

      - name: Runtime import smoke
        run: |
          python - <<'PY'
          from corq.engine import run_daily
          from corq.model import build_corq_prediction
          from corq.ranking import rank_corq, make_all_match_view, top7_from_ranking

          print("CORQ imports OK")
          PY

      - name: Runtime sample smoke
        run: |
          if [ -f data/candidates.sample.json ]; then
            python engine.py --input data/candidates.sample.json --output-root smoke_outputs
          else
            python engine.py --output-root smoke_outputs
          fi

      - name: Inspect smoke outputs
        run: |
          find smoke_outputs -maxdepth 4 -type f | sort || true
