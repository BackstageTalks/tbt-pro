name* CORQ Smoke Tests

on:
  workflow_*ispatch:
  push:
    branches:
   *  - main

permissions:
  contents:*read

jobs:
  smoke:
    runs-on: *buntu-latest

    steps:
      - n*me: Checkout
        uses: actions*checkout@v4

      - name: Setup P*thon
        uses: actions/setup-p*thon@v5
        with:
          py*hon-version: "3.11"

      - name:*Install dependencies
        run: *
          python -m pip install -*upgrade pip
          if [ -f requ*rements.txt ]; then pip install -r*requirements.txt; fi

      - name* Compile
        run: |
          *ython -m py_compile \
            *ngine.py \
            corq/*.py \*            corq/site/*.py \
     *      corq/web/*.py \
            *hinq/*.py \
            runtime/*.*y

      - name: Runtime import sm*ke
        run: |
          python*- <<'PY'
          from corq.engin* import run_daily
          from c*rq.model import build_corq_predict*on
          from corq.ranking imp*rt rank_corq, make_all_match_view,*top7_from_ranking

          print*"CORQ imports OK")
          PY

 *    - name: Runtime sample smoke
 *      run: |
          python engi*e.py --input data/candidates.sample.json --output-root smoke_outputs
