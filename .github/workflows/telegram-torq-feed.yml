def send(message):
    if not BOT_TOKEN:
        raise RuntimeError(
            "Missing Telegram bot token. Set GitHub secret TGBOT."
        )

    if not CHAT_ID:
        raise RuntimeError(
            "Missing Telegram chat id. Set GitHub secret TGCHID."
        )

    response = requests.post(
        f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
        json={
            "chat_id": CHAT_ID,
            "text": message,
            "disable_web_page_preview": True,
        },
        timeout=30,
    )

    response.raise_for_status()


def main():
    local_now = datetime.now(LOCAL_TZ)

    if not FORCE_SEND and local_now.hour != 9:
        print("Not local 09:00 Europe/Bratislava, Telegram send skipped.")
        return

    message = build_message()
    print(message)
    send(message)


if __name__ == "__main__":
    main()
