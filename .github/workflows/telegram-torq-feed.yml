name: Telegram Torq Feed

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send even if local time is not 09:00"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

concurrency:
  group: telegram-torq-feed
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      TG_BOT_BTLKR: ${{ secrets.TG_BOT_BTLKR }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TG_FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_send || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Send Torq Telegram feed
        run: python telegram_torq_feed.py
