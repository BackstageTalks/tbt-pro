name: Build Torq Pages

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-torq-pages
  cancel-in-progress: false

jobs:
  build-torq:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      USE_ODDS_API_FALLBACK: "false"

      RECENT_FORM_DAYS: "150"

      TORQ_TOP_MIN_ODDS: "1.50"
      TORQ_TOP_MAX_ODDS: "3.50"
      TORQ_MIN_PROBABILITY: "0.60"
      TORQ_MIN_AI_MATCH: "70"

      B_HAND_MIN_SELECTED_ODDS: "1.75"
      B_HAND_MAX_SELECTED_ODDS: "2.50"
      B_HAND_MAX_MARKET_GAP_PP: "12"
      B_HAND_MIN_EDGE_PP: "4"
      B_HAND_MIN_AI_MATCH: "65"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare public directory
        run: |
          mkdir -p public

      - name: Compile Torq files
        run: |
          python -m py_compile src/elo/torq_fusion.py
          python -m py_compile src/marq_ai/torq_market.py
          python -m py_compile torq_build.py
          python -m py_compile telegram_torq_feed.py

      - name: Build Torq pages and RSS
        run: |
          python torq_build.py

      - name: Verify Torq outputs
        run: |
          echo "=== Verify Torq public files ==="
          test -f public/h4v34n1c3d4y150/index.html
          test -f public/h4v34n1c3d4y151/index.html
          test -f public/h4v34n1c3d4y152/index.html
          test -f public/h4v34n1c3d4y153/index.html
          test -f public/h4v34n1c3d4y154/index.html
          test -f public/h4v34n1c3d4y155.xml
          test -f public/h4v34n1c3d4y156.xml
          test -f public/h4v34n1c3d4y157.xml
          echo "Torq public files exist."

      - name: Commit Torq generated files
        run: |
