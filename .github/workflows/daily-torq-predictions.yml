name: Daily Torq Predictions

on:
  schedule:
    # 07:05 UTC = 09:05 SK/CZ during summer time.
    - cron: '5 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-torq-predictions
  cancel-in-progress: false

jobs:
  torq-daily:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      TENNISAPI_RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      TENNISAPI_CATEGORY_IDS: "3,6,871"
      TENNISAPI_PROVIDER_ID: "1"
      USE_ODDS_API_FALLBACK: "false"
      RECENT_FORM_DAYS: "150"
      TORQ_FORCE_TA_REFRESH: "true"

      TORQ_TOP_MIN_ODDS: "1.50"
      TORQ_TOP_MAX_ODDS: "3.50"
      TORQ_MIN_PROBABILITY: "0.60"
      TORQ_MIN_AI_MATCH: "70"

      B_HAND_MIN_SELECTED_ODDS: "1.75"
      B_HAND_MAX_SELECTED_ODDS: "2.50"
      B_HAND_MAX_MARKET_GAP_PP: "12"
      B_HAND_MIN_EDGE_PP: "4"
      B_HAND_MIN_AI_MATCH: "65"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas lxml html5lib beautifulsoup4 requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile Torq pipeline
        run: |
          python -m py_compile tennisapi_client.py
          python -m py_compile torq_tennisabstract.py
          python -m py_compile torq_daily.py
          python -m py_compile src/elo/torq_fusion.py
          python -m py_compile src/marq_ai/torq_market.py
          python -m py_compile torq_build.py

      - name: Fetch RapidAPI matches and build base predictions
        run: python torq_daily.py

      - name: Build Torq pages and RSS
        run: python torq_build.py

      - name: Verify outputs
        run: |
          test -f public/all_predictions_latest.json
          test -f public/h4v34n1c3d4y150/index.html
          test -f public/h4v34n1c3d4y151/index.html
          test -f public/h4v34n1c3d4y152/index.html
          test -f public/h4v34n1c3d4y155.xml
          test -f public/h4v34n1c3d4y156.xml
          echo "Torq daily outputs verified."

      - name: Commit generated data and pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public data tennisapi_client.py torq_tennisabstract.py torq_daily.py src/elo/torq_fusion.py .github/workflows/daily-torq-predictions.yml || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Torq daily predictions"
            git pull --rebase --autostash
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
